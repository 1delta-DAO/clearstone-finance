<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="42%" r="70%">
      <stop offset="0%"  stop-color="#1A2540"/>
      <stop offset="55%" stop-color="#0D1730"/>
      <stop offset="100%" stop-color="#070D1F"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C5CFDC" stop-opacity="0.28"/>
      <stop offset="55%"  stop-color="#A6B3C5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A6B3C5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cs-skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7E8EA7"/>
      <stop offset="100%" stop-color="#1F2D48"/>
    </linearGradient>
    <linearGradient id="cs-highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F4F7FB"/>
      <stop offset="100%" stop-color="#9DACC2"/>
    </linearGradient>
    <linearGradient id="cs-fusion" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3A4D6E"/>
      <stop offset="100%" stop-color="#0F1A33"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#A6B3C5" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Halo behind the mark -->
  <circle cx="320" cy="315" r="240" fill="url(#halo)"/>

  <!-- Logo (positioned + scaled) -->
  <g transform="translate(165 130) scale(0.66)">
    <!-- outer skin with silhouette hairline -->
    <g stroke="#6F8099" stroke-opacity="0.55" stroke-width="1.2" stroke-linejoin="round">
      <path d="M205 0 L205 102 L87.5 175.5 L0 123 Z"           fill="url(#cs-skin)"/>
      <path d="M0 123 L87.5 175.5 L87.5 294.3 L0 346.8 Z"      fill="url(#cs-skin)"/>
      <path d="M0 346.8 L87.5 294.3 L304.5 420 L207.5 471.5 Z" fill="url(#cs-skin)"/>
    </g>
    <!-- inner highlight bevel -->
    <path d="M16.5 134.215 L195 26.5 L195 90 L71.5 167.5 Z"           fill="url(#cs-highlight)"/>
    <path d="M16.5 134.215 L71.5 167.5 L71.5 300.503 L16.5 334.003 Z" fill="url(#cs-highlight)"/>
    <path d="M16.5 334.003 L71.5 300.503 L209 383 L209 454 Z"         fill="url(#cs-highlight)"/>
    <!-- specular ridge -->
    <path d="M71.5 167.5 L71.5 300.503" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="0.8" fill="none"/>
    <!-- fusion mass with brighter silhouette hairline (otherwise melts into dark bg) -->
    <g stroke="#7E8FA8" stroke-opacity="0.65" stroke-width="1.3" stroke-linejoin="round">
      <path d="M209 98.5 L209 4.3335 L412.5 124.5 L412.5 222.338 Z" fill="url(#cs-fusion)"/>
      <path d="M209 219 L309.5 165 L408.5 225.5 L308 279.5 Z"       fill="url(#cs-fusion)"/>
      <path d="M209 357 L209 224 L306 283.5 L306 415.5 Z"           fill="url(#cs-fusion)"/>
    </g>
    <path d="M209 4.3335 L412.5 124.5" stroke="#6E809A" stroke-opacity="0.8" stroke-width="0.85" fill="none"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="555" y="285" font-size="86" font-weight="600" fill="#E2E7EF" letter-spacing="-2">clearstone</text>
    <text x="555" y="346" font-size="36" font-weight="300" fill="#A6B3C5" letter-spacing="6">fusion</text>

    <line x1="555" y1="380" x2="700" y2="380" stroke="#4F607C" stroke-width="1"/>

    <text x="555" y="430" font-size="28" font-weight="500" fill="#C5CFDC" letter-spacing="-0.3">
      Institutional DeFi infrastructure
    </text>
    <text x="555" y="468" font-size="20" font-weight="400" fill="#7C8BA3" letter-spacing="0.2">
      KYC-gated savings &amp; trading, white-labeled.
    </text>
    <text x="555" y="494" font-size="20" font-weight="400" fill="#7C8BA3" letter-spacing="0.2">
      Solana-native. Audit-first.
    </text>
  </g>

  <!-- Bottom-right network badge -->
  <g transform="translate(965 555)">
    <rect x="0" y="0" width="200" height="42" rx="21" fill="#0F1A33" stroke="#4F607C" stroke-width="1"/>
    <circle cx="22" cy="21" r="4.5" fill="#5DD389"/>
    <text x="40" y="27" font-family="Geist, -apple-system, BlinkMacSystemFont, sans-serif"
          font-size="14" font-weight="500" fill="#C5CFDC" letter-spacing="2">
      BUILT ON SOLANA
    </text>
  </g>

  <!-- Top-left brand mark -->
  <text x="60" y="60" font-family="Geist, sans-serif" font-size="14" font-weight="500"
        fill="#7C8BA3" letter-spacing="3">CLEARSTONE.FI</text>
</svg>
