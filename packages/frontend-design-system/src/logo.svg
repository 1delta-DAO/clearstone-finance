<svg width="413" height="472" viewBox="-30 -20 473 522" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft drop shadow -->
    <filter id="cs-drop" x="-30%" y="-20%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dx="0" dy="9"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer skin — clean 2-stop ramps -->
    <linearGradient id="g-top" x1="87.5" y1="175.5" x2="205" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3F4F6B"/>
      <stop offset="100%" stop-color="#9DACC2"/>
    </linearGradient>
    <linearGradient id="g-left" x1="0" y1="123" x2="87.5" y2="346.8" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7E8EA7"/>
      <stop offset="100%" stop-color="#1F2D48"/>
    </linearGradient>
    <linearGradient id="g-front" x1="0" y1="346.8" x2="304.5" y2="471.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5E6E89"/>
      <stop offset="100%" stop-color="#15213B"/>
    </linearGradient>

    <!-- Inner highlights — polished, smooth ramps -->
    <linearGradient id="g-h-top" x1="16.5" y1="175" x2="195" y2="26.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A6B3C5"/>
      <stop offset="100%" stop-color="#F0F4F9"/>
    </linearGradient>
    <linearGradient id="g-h-left" x1="16.5" y1="134" x2="71.5" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F4F7FB"/>
      <stop offset="55%"  stop-color="#BCC9DA"/>
      <stop offset="100%" stop-color="#6F8099"/>
    </linearGradient>
    <linearGradient id="g-h-front" x1="16.5" y1="334" x2="209" y2="454" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B5C2D2"/>
      <stop offset="100%" stop-color="#3F506E"/>
    </linearGradient>

    <!-- Fusion — deep navy, smooth -->
    <linearGradient id="g-f-top" x1="209" y1="98.5" x2="412.5" y2="124.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3A4D6E"/>
      <stop offset="100%" stop-color="#0F1A33"/>
    </linearGradient>
    <linearGradient id="g-f-front" x1="209" y1="219" x2="408.5" y2="225.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3D4F70"/>
      <stop offset="100%" stop-color="#0F1A33"/>
    </linearGradient>
    <linearGradient id="g-f-side" x1="209" y1="224" x2="306" y2="415.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2A3D5C"/>
      <stop offset="100%" stop-color="#060D1F"/>
    </linearGradient>

    <!-- Atmosphere -->
    <radialGradient id="g-shadow" cx="200" cy="476" r="195" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#070D1F" stop-opacity="0.40"/>
      <stop offset="55%"  stop-color="#070D1F" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#070D1F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-aura" cx="180" cy="220" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A6B3C5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A6B3C5" stop-opacity="0"/>
    </radialGradient>

    <!-- Reflection fade -->
    <linearGradient id="g-refl-fade" x1="0" y1="471.5" x2="0" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <mask id="cs-refl-mask" maskUnits="userSpaceOnUse" x="-30" y="471.5" width="473" height="80">
      <rect x="-30" y="471.5" width="473" height="80" fill="url(#g-refl-fade)"/>
    </mask>
  </defs>

  <!-- Aura -->
  <rect x="-30" y="-20" width="473" height="522" fill="url(#g-aura)"/>

  <!-- Floor reflection -->
  <g mask="url(#cs-refl-mask)" transform="matrix(1 0 0 -1 0 943)">
    <path d="M205 0 L205 102 L87.5 175.5 L0 123 Z"           fill="url(#g-top)"/>
    <path d="M0 123 L87.5 175.5 L87.5 294.3 L0 346.8 Z"      fill="url(#g-left)"/>
    <path d="M0 346.8 L87.5 294.3 L304.5 420 L207.5 471.5 Z" fill="url(#g-front)"/>
    <path d="M209 98.5 L209 4.3335 L412.5 124.5 L412.5 222.338 Z" fill="url(#g-f-top)"/>
    <path d="M209 219 L309.5 165 L408.5 225.5 L308 279.5 Z"       fill="url(#g-f-front)"/>
    <path d="M209 357 L209 224 L306 283.5 L306 415.5 Z"           fill="url(#g-f-side)"/>
  </g>

  <!-- Contact shadow -->
  <ellipse cx="200" cy="476" rx="195" ry="11" fill="url(#g-shadow)"/>

  <!-- Stone outer skin (mid-tone hairline keeps silhouette visible on any bg) -->
  <g filter="url(#cs-drop)"
     stroke="#6F8099" stroke-opacity="0.55" stroke-width="1.2"
     stroke-linejoin="round" stroke-linecap="round">
    <path d="M205 0 L205 102 L87.5 175.5 L0 123 Z"           fill="url(#g-top)"/>
    <path d="M0 123 L87.5 175.5 L87.5 294.3 L0 346.8 Z"      fill="url(#g-left)"/>
    <path d="M0 346.8 L87.5 294.3 L304.5 420 L207.5 471.5 Z" fill="url(#g-front)"/>
  </g>

  <!-- Inner highlight bevel facets -->
  <path d="M16.5 134.215 L195 26.5 L195 90 L71.5 167.5 Z"           fill="url(#g-h-top)"/>
  <path d="M16.5 134.215 L71.5 167.5 L71.5 300.503 L16.5 334.003 Z" fill="url(#g-h-left)"/>
  <path d="M16.5 334.003 L71.5 300.503 L209 383 L209 454 Z"         fill="url(#g-h-front)"/>

  <!-- Single specular ridge along the inner C-crease (the signature detail) -->
  <path d="M71.5 167.5 L71.5 300.503"
        stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="0.6" fill="none"/>

  <!-- Outer rim light along the lit top-back edge -->
  <path d="M0 123 L205 0"
        stroke="#E2E7EF" stroke-opacity="0.7" stroke-width="0.85" fill="none"/>

  <!-- Fusion mass (the dark cuboid would otherwise melt into dark backgrounds —
       brighter hairline restores its silhouette without overwhelming on light bg) -->
  <g filter="url(#cs-drop)"
     stroke="#7E8FA8" stroke-opacity="0.65" stroke-width="1.3"
     stroke-linejoin="round" stroke-linecap="round">
    <path d="M209 98.5 L209 4.3335 L412.5 124.5 L412.5 222.338 Z" fill="url(#g-f-top)"/>
    <path d="M209 219 L309.5 165 L408.5 225.5 L308 279.5 Z"       fill="url(#g-f-front)"/>
    <path d="M209 357 L209 224 L306 283.5 L306 415.5 Z"           fill="url(#g-f-side)"/>
  </g>

  <!-- Fusion top-back rim light -->
  <path d="M209 4.3335 L412.5 124.5"
        stroke="#6E809A" stroke-opacity="0.8" stroke-width="0.75" fill="none"/>
</svg>
